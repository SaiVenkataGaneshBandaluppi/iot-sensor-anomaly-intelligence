services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: iot_anomaly
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8009:8009"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@db:5432/iot_anomaly
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install --quiet streamlit==1.56.0 requests pandas plotly &&
             streamlit run streamlit_app.py --server.port 8504 --server.address 0.0.0.0"
    ports:
      - "8504:8504"
    volumes:
      - ./streamlit_app.py:/app/streamlit_app.py:ro
    environment:
      API_BASE_URL: http://api:8009
    depends_on:
      - api

volumes:
  pg_data:
